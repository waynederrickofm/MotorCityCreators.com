<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motor City Creators — Social Promo (1:1)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--gold:#C9A227;--gold-light:#E2C04A;--gold-dim:#8A7020;--black:#0A0A0A}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
  /* centered square so it can be cropped to 1:1 for IG / TikTok */
  .square{position:relative;width:min(100vw,100vh);height:min(100vw,100vh);background:radial-gradient(circle at 50% 42%,#15130c 0%,#0a0a0a 65%);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;text-align:center}

  .grid{position:absolute;inset:-40% 0 -10% 0;background-image:linear-gradient(rgba(201,162,39,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(201,162,39,.12) 1px,transparent 1px);background-size:6% 6%;transform:perspective(360px) rotateX(64deg);transform-origin:50% 100%;animation:road 6s linear infinite;opacity:.45}
  @keyframes road{from{background-position:0 0}to{background-position:0 6%}}
  .glow{position:absolute;width:88%;height:55%;background:radial-gradient(ellipse at center,rgba(201,162,39,.25),transparent 70%);filter:blur(18px);animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:.85;transform:scale(1.05)}}

  .badge{position:relative;z-index:3;width:46%;opacity:0;transform:scale(.7) translateY(10px);animation:logoIn 1.1s cubic-bezier(.2,.8,.2,1) .25s forwards}
  .badge img{width:100%;display:block;border-radius:18px;filter:drop-shadow(0 14px 50px rgba(201,162,39,.4))}
  .badge::after{content:"";position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-18deg);opacity:0;animation:shimmer 2.8s ease-in-out 1.2s infinite}
  @keyframes shimmer{0%{left:-30%;opacity:0}10%{opacity:.9}45%{left:120%;opacity:0}100%{left:120%;opacity:0}}
  @keyframes logoIn{60%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}

  .tagline{z-index:3;margin-top:5%;font-family:'Bebas Neue',sans-serif;font-size:4.4vmin;letter-spacing:.4em;text-indent:.4em;color:#fff;opacity:0;transform:translateY(12px);animation:up .8s ease 1.5s forwards}
  .tagline b{color:var(--gold-light)}
  .rev{z-index:3;margin-top:4%;font-family:'Bebas Neue',sans-serif;font-size:9vmin;line-height:1;color:#fff;opacity:0;transform:scale(.8);animation:pop .7s cubic-bezier(.2,.9,.3,1.3) 2.3s forwards}
  .rev span{color:var(--gold-light)}
  .pills{z-index:3;margin-top:4%;display:flex;gap:1.4vmin;flex-wrap:wrap;justify-content:center;max-width:88%;opacity:0;transform:translateY(12px);animation:up .8s ease 3s forwards}
  .pill{font-size:2vmin;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,162,39,.5);padding:1.2vmin 2vmin;border-radius:40px;background:rgba(201,162,39,.06)}
  .url{z-index:3;margin-top:5%;color:var(--gold);font-weight:800;letter-spacing:.22em;text-transform:uppercase;font-size:2.4vmin;opacity:0;animation:up .8s ease 3.6s forwards}

  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
  <div class="square">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="badge"><img src="assets/brand/logo-icon.png" alt="Motor City Creators"/></div>
    <div class="tagline">DETROIT <b>TO THE</b> WORLD</div>
    <div class="rev">EARN <span>$5K&ndash;$10K</span>/MO</div>
    <div class="pills">
      <span class="pill">TikTok</span><span class="pill">Instagram</span><span class="pill">YouTube</span><span class="pill">X</span><span class="pill">Threads</span><span class="pill">Discord</span>
    </div>
    <div class="url">motorcitycreators.com</div>
  </div>
</body>
</html>
