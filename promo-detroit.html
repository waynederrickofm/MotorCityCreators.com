<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motor City Creators — Detroit to the World (16:9)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--gold:#C9A227;--gold-light:#E2C04A}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden}
  .stage{position:relative;width:100vw;height:100vh;overflow:hidden;font-family:'Montserrat',sans-serif}

  .skyline{
    position:absolute;inset:-8%;
    background:url('assets/brand/social-banner.png') center/cover no-repeat;
    animation:kenBurns 12s ease-in-out infinite alternate;
    filter:brightness(.92) saturate(1.08);
  }
  @keyframes kenBurns{
    from{transform:scale(1) translateY(0)}
    to{transform:scale(1.08) translateY(-2%)}
  }

  .vignette{position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 45%,transparent 30%,rgba(0,0,0,.55) 100%);pointer-events:none}
  .scan{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(201,162,39,.06) 48%,transparent 52%,transparent 100%);background-size:100% 200%;animation:scan 4s linear infinite;pointer-events:none;opacity:.5}
  @keyframes scan{from{background-position:0 -100%}to{background-position:0 200%}}

  .content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5vw}
  .logo-badge{
    width:min(28vw,220px);opacity:0;transform:scale(.85);
    animation:logoIn 1s ease .3s forwards;
    filter:drop-shadow(0 16px 48px rgba(201,162,39,.45));
  }
  @keyframes logoIn{to{opacity:1;transform:scale(1)}}

  .tagline{
    margin-top:clamp(16px,3vw,28px);
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(2rem,5.5vw,4.2rem);
    letter-spacing:.38em;text-indent:.38em;
    color:#fff;opacity:0;animation:fadeUp .8s ease 1s forwards;
  }
  .tagline b{color:var(--gold-light)}

  .sub{
    margin-top:clamp(10px,2vw,18px);
    font-size:clamp(.65rem,1.4vw,.95rem);
    font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    color:var(--gold);opacity:0;animation:fadeUp .8s ease 1.4s forwards;
  }

  .cta-row{
    margin-top:clamp(20px,4vw,36px);
    display:flex;gap:clamp(12px,2vw,20px);flex-wrap:wrap;justify-content:center;
    opacity:0;animation:fadeUp .8s ease 1.9s forwards;
  }
  .cta-row a,.cta-row span{
    font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    font-size:clamp(.6rem,1.2vw,.85rem);padding:clamp(10px,1.4vw,14px) clamp(18px,2.5vw,28px);
  }
  .cta-row a{background:linear-gradient(90deg,#8A7020,var(--gold),var(--gold-light));color:#000;text-decoration:none}
  .cta-row span{color:var(--gold);border:1px solid rgba(201,162,39,.45);padding-top:clamp(9px,1.3vw,13px);padding-bottom:clamp(9px,1.3vw,13px)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="stage">
    <div class="skyline" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="scan" aria-hidden="true"></div>
    <div class="content">
      <img class="logo-badge" src="assets/brand/logo-icon.png" alt="Motor City Creators"/>
      <div class="tagline">DETROIT <b>TO THE</b> WORLD</div>
      <div class="sub">Motor City Creators · Detroit Built · World Bound</div>
      <div class="cta-row">
        <a href="#">Apply Free</a>
        <span>motorcitycreators.com</span>
      </div>
    </div>
  </div>
</body>
</html>
