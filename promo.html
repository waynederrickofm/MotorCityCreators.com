<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motor City Creators — Brand Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--gold:#C9A227;--gold-light:#E2C04A;--gold-dim:#8A7020;--black:#0A0A0A}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--black);overflow:hidden}
  .stage{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,#15130c 0%,#0a0a0a 60%);overflow:hidden;font-family:'Montserrat',sans-serif}

  /* animated background */
  .grid{position:absolute;inset:-50% 0 -10% 0;background-image:linear-gradient(rgba(201,162,39,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(201,162,39,.12) 1px,transparent 1px);background-size:54px 54px;transform:perspective(420px) rotateX(62deg);transform-origin:50% 100%;animation:road 6s linear infinite;opacity:.5}
  @keyframes road{from{background-position:0 0}to{background-position:0 54px}}
  .glow{position:absolute;width:90vw;max-width:1100px;height:60vh;background:radial-gradient(ellipse at center,rgba(201,162,39,.22),transparent 70%);filter:blur(20px);animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.45;transform:scale(.95)}50%{opacity:.8;transform:scale(1.05)}}

  /* logo */
  .logo-wrap{position:relative;z-index:3;opacity:0;transform:scale(.7);animation:logoIn 1.1s cubic-bezier(.2,.8,.2,1) .25s forwards}
  .logo-wrap img{width:min(72vw,720px);display:block;filter:drop-shadow(0 14px 50px rgba(201,162,39,.35))}
  @keyframes logoIn{0%{opacity:0;transform:scale(.7) translateY(18px)}60%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
  /* shimmer sweep over logo */
  .logo-wrap::after{content:"";position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);opacity:0;animation:shimmer 2.6s ease-in-out 1.2s infinite}
  @keyframes shimmer{0%{left:-30%;opacity:0}10%{opacity:.9}45%{left:120%;opacity:0}100%{left:120%;opacity:0}}

  .tagline{z-index:3;margin-top:26px;font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,3.4vw,2.6rem);letter-spacing:.42em;color:#fff;text-indent:.42em;opacity:0;transform:translateY(14px);animation:up .8s ease 1.5s forwards}
  .tagline b{color:var(--gold-light)}

  .pills{z-index:3;margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:80vw;opacity:0;transform:translateY(14px);animation:up .8s ease 2.1s forwards}
  .pill{font-size:clamp(.6rem,1.2vw,.8rem);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,162,39,.5);padding:8px 14px;border-radius:40px;background:rgba(201,162,39,.06)}

  .rev{z-index:3;margin-top:30px;font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,7vw,5rem);line-height:1;letter-spacing:.02em;color:#fff;opacity:0;transform:scale(.8);animation:pop .7s cubic-bezier(.2,.9,.3,1.3) 2.7s forwards}
  .rev span{color:var(--gold-light)}
  .rev small{display:block;font-family:'Montserrat',sans-serif;font-size:clamp(.6rem,1.3vw,.85rem);font-weight:700;letter-spacing:.28em;color:#9a9a9a;margin-top:10px}

  .cta{z-index:3;margin-top:30px;display:flex;align-items:center;gap:18px;opacity:0;transform:translateY(14px);animation:up .8s ease 3.5s forwards}
  .cta a{font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(.65rem,1.4vw,.85rem);padding:14px 28px;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-light));color:var(--black);text-decoration:none}
  .cta .url{color:var(--gold);font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:clamp(.6rem,1.2vw,.8rem)}

  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="logo-wrap"><img src="assets/brand/logo-primary.png" alt="Motor City Creators"/></div>
    <div class="tagline">DETROIT <b>TO THE</b> WORLD</div>
    <div class="pills">
      <span class="pill">TikTok</span><span class="pill">Instagram</span><span class="pill">YouTube</span><span class="pill">X</span><span class="pill">Threads</span><span class="pill">Discord</span>
    </div>
    <div class="rev">EARN <span>$5K&ndash;$10K</span> / MONTH<small>WE MANAGE CREATORS · WE BUILD BRANDS</small></div>
    <div class="cta"><a href="#">Apply Free</a><span class="url">motorcitycreators.com</span></div>
  </div>
</body>
</html>
